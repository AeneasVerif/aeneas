# Detects whether the self-hosted runner is up by checking whether the
# "heartbeat" regular job completed recently. If so, we can use the runner; if
# not, fall back to github-hosted runners.
name: "Select runner"

on:
  workflow_call:
    outputs:
      runs_on:
        value: ${{ jobs.select.outputs.runs_on }}

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      runs_on: ${{ steps.select.outputs.runs_on }}
    steps:
      - id: select
        run: |
          set -euo pipefail

          heartbeat_repository="aeneasverif/charon"
          self_hosted='["self-hosted","linux","nix"]'
          github_hosted='["ubuntu-latest"]'
          max_age_seconds=$((3 * 60 * 60))

          query_error="$(mktemp)"
          if default_branch=$(curl -fsSL "https://api.github.com/repos/${heartbeat_repository}" 2>"$query_error" | jq -r .default_branch); then
            :
          else
            message="$(tr '\n' ' ' < "$query_error")"
            echo "::warning title=Could not query Charon default branch::Falling back to GitHub-hosted runner. curl: $message"
            echo "runs_on=$github_hosted" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          : > "$query_error"
          if completed_at=$(curl -fsSL \
              "https://api.github.com/repos/${heartbeat_repository}/actions/workflows/runner-heartbeat.yml/runs?branch=${default_branch}&status=success&per_page=1" \
              2>"$query_error" \
              | jq -r '.workflow_runs[0].updated_at // ""'); then
            :
          else
            message="$(tr '\n' ' ' < "$query_error")"
            echo "::warning title=Could not query Charon runner heartbeat::Falling back to GitHub-hosted runner. curl: $message"
            echo "runs_on=$github_hosted" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$completed_at" ]; then
            echo "::notice title=No Charon runner heartbeat::Falling back to GitHub-hosted runner; no successful Charon runner-heartbeat run was found on ${default_branch}."
            echo "runs_on=$github_hosted" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          now="$(date -u +%s)"
          heartbeat="$(date -u -d "$completed_at" +%s)"
          age="$((now - heartbeat))"

          if [ "$age" -le "$max_age_seconds" ]; then
            echo "Recent Charon runner heartbeat found at $completed_at; selecting self-hosted runner labels."
            echo "runs_on=$self_hosted" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Stale Charon runner heartbeat::Falling back to GitHub-hosted runner; latest Charon runner heartbeat was at $completed_at."
            echo "runs_on=$github_hosted" >> "$GITHUB_OUTPUT"
          fi
